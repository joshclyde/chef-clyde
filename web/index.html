<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>web</title>
    <script>
      // Set the theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var key = "chef-clyde-theme";
          var theme = localStorage.getItem(key);
          if (theme !== "light" && theme !== "dark") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", theme);

          // Same idea for AI motion: avoid a flash of the wrong motion state.
          var motion = localStorage.getItem("chef-clyde-ai-motion");
          if (motion !== "on" && motion !== "off") motion = "on";
          document.documentElement.setAttribute("data-ai-motion", motion);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
